<!doctype html>
<html lang="en" data-palette="aurora">
  <!-- Palette flag: change data-palette to "spectral" above to flip the whole
       site to the violet→cyan theme. "aurora" is the default cyan→green. -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0b0d" />

    <!--
      DEPLOY TODO: once the production domain is live, set it below.
      Replace https://artistry.example.com with the real URL in:
        - <link rel="canonical">
        - <meta property="og:url">
        - og:image / twitter:image (prefix the domain for absolute URLs)
        - the JSON-LD "url"/"logo"/"image" fields
      Absolute URLs are required for social scrapers to fetch the OG image.
    -->

    <!-- Critical inline tokens: mirrors :root in src/index.css so the correct
         palette + dark background are applied on the very first paint. This
         prevents the flash of unstyled colour before the bundled stylesheet
         resolves the CSS variables. -->
    <style>
      :root {
        --bg: 10 11 13;
        --surface: 20 22 26;
        --surface-2: 27 30 36;
        --border: 35 38 45;
        --grad-from: 0 229 255;
        --grad-to: 61 220 132;
        --accent: 36 215 172;
        --text: 244 246 248;
        --text-muted: 138 144 153;
      }
      :root[data-palette="spectral"] {
        --bg: 8 8 12;
        --surface: 19 19 32;
        --surface-2: 27 27 43;
        --border: 38 38 54;
        --grad-from: 124 92 255;
        --grad-to: 0 229 255;
        --accent: 155 140 255;
        --text: 245 245 250;
        --text-muted: 139 139 158;
      }
      html {
        background: rgb(var(--bg));
        color-scheme: dark;
      }
      body {
        margin: 0;
      }
      #root {
        min-height: 100dvh;
      }
    </style>

    <!-- Preload the above-the-fold fonts to avoid a late text repaint -->
    <link rel="preload" href="/assets/fonts/bricolage-800.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/IntroDemo-BlackCAPS.otf" as="font" type="font/otf" crossorigin />

    <title>Artistry — A universal WebAR creation platform</title>
    <meta
      name="description"
      content="Artistry is a universal WebAR creation platform. Interact with 3D objects, videos and animations directly in the browser — no app install required."
    />
    <meta name="author" content="Balmuzdaq Studio" />
    <meta name="robots" content="index,follow" />
    <!-- <link rel="canonical" href="https://artistry.example.com/" /> -->

    <!-- Favicons — .ico for legacy, .svg for modern browsers, apple-touch-icon
         for Safari/iOS, manifest for Android/PWA install icons. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Artistry" />
    <meta property="og:title" content="Artistry — A universal WebAR creation platform" />
    <meta
      property="og:description"
      content="Interact with 3D objects, videos and animations directly in the browser — no app install required."
    />
    <!-- <meta property="og:url" content="https://artistry.example.com/" /> -->
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Artistry — a universal WebAR creation platform" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Artistry — A universal WebAR creation platform" />
    <meta
      name="twitter:description"
      content="Interact with 3D objects, videos and animations directly in the browser — no app install required."
    />
    <meta name="twitter:image" content="/og.png" />
    <meta name="twitter:image:alt" content="Artistry — a universal WebAR creation platform" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Artistry",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web browser",
        "browserRequirements": "Requires JavaScript and WebGL",
        "description": "A universal WebAR creation platform. Interact with 3D objects, videos and animations directly in the browser — no app install required.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Organization", "name": "Balmuzdaq Studio" }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Artistry"
      }
    </script>

    <!-- Preconnect to the external Spline scene host -->
    <link rel="preconnect" href="https://prod.spline.design" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
